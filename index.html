<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h1 class="logo">Career Guide</h1>

    <input type="text" id="searchInput" placeholder="Search career...">
    <button onclick="searchCareer()">Search</button>

    <button onclick="logout()">Logout</button>
</nav>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Menu</h3>
    <ul>
        <li onclick="showSection('tracker')">Roadmap Tracker</li>
        <li onclick="showSection('career')">Explore Career</li>
        <li onclick="goToContact()">Contact</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main-content">

<!-- TRACKER -->
<div id="tracker" class="section">
    <h2>Your Career Roadmap</h2>
    <div id="roadmapSteps"></div>
    <h3 id="progressText"></h3>
</div>

<!-- CAREER -->
<div id="career" class="section" style="display:none;">
    <h2>Choose Your Path</h2>

    <button onclick="startQuiz()">I am confused</button>
    <button onclick="selectStream()">I already know my stream</button>

    <!-- QUIZ -->
    <div id="quiz" style="display:none;">
        <h3 id="questionText"></h3>
        <div id="optionsContainer"></div>
        <button onclick="nextQuestion()">Next</button>
    </div>

    <!-- STREAM -->
    <div id="stream" style="display:none;">
        <h3>Select your stream</h3>
        <select id="streamSelect">
            <option value="tech">Technology</option>
            <option value="business">Business</option>
            <option value="arts">Arts</option>
            <option value="healthcare">Healthcare</option>
        </select>
        <button onclick="showStreamCareer()">Show Careers</button>
    </div>

    <div id="result" style="display:none;"></div>
</div>

<!-- SEARCH -->
<div id="search" class="section" style="display:none;">
    <h2>Career Details</h2>
    <div id="careerDetailsContent"></div>
    <canvas id="careerChart" width="400" height="200"></canvas>
</div>

<!-- CONTACT -->
<div id="contact" class="section" style="display:none;">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Message"></textarea>
        <button>Send</button>
    </form>
</div>

</div>

<script src="script.js"></script>

<footer>
<p>© 2026 CareerGuide</p>
</footer>

</body>
</html>
