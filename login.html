<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: radial-gradient(circle, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 90%;
    max-width: 350px;
}

/* Box */
.box {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    text-align: center;
    color: white;
}

/* Inputs */
input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 6px;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: white;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}

/* Links */
p {
    margin-top: 10px;
    font-size: 14px;
}

span {
    color: #00d4ff;
    cursor: pointer;
}

/* Hide register initially */
#registerBox {
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div class="box" id="loginBox">
        <h2>Login</h2>

        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">

        <button onclick="login()">Login</button>

        <p>Don't have an account? 
            <span onclick="showRegister()">Register</span>
        </p>
    </div>

    <!-- REGISTER -->
    <div class="box" id="registerBox">
        <h2>Register</h2>

        <input type="text" id="regUser" placeholder="Create Username">
        <input type="password" id="regPass" placeholder="Create Password">

        <button onclick="register()">Register</button>

        <p>Already have an account? 
            <span onclick="showLogin()">Login</span>
        </p>
    </div>

</div>

<script>
// Switch UI
function showRegister() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("registerBox").style.display = "block";
}

function showLogin() {
    document.getElementById("registerBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

// Register
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if (user === "" || pass === "") {
        alert("Fill all fields ⚠️");
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("Registered Successfully ✅ Now login");
    showLogin();
}

// Login
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");

    if (user === savedUser && pass === savedPass) {
        alert("Login Successful ✅");
        window.location.href = "index.html";
    } else {
        let goRegister = confirm("Invalid Login ❌\nDo you want to register?");
        if (goRegister) {
            showRegister();
        }
    }
}
</script>

</body>
</html>
